<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra Você ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #333;
}

.container {
  padding: 30px;
}

h1 {
  color: #fff;
  font-size: 40px;
}

p {
  font-size: 18px;
  margin: 20px 0;
}

.galeria {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.galeria img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

.botao {
  display: inline-block;
  margin-top: 30px;
  padding: 15px 25px;
  background-color: #ff4b5c;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
}

.botao:hover {
  background-color: #e8414f;
}
</style>

</head>

<body>

<div class="container">
  <h1>❤️ Pra Nós Dois ❤️</h1>

  <p>
    Desde o dia que eu te pedi em namoro ao som de Careless Whisper,<br>
    minha vida ficou muito mais bonita com você.<br><br>
    Isso aqui é só um pedacinho do que eu sinto ❤️
  </p>

  <div class="galeria">
    <!-- TROCA OS NOMES DAS IMAGENS -->
    <img src="foto1.jpeg" alt="Nós">
    <img src="foto2.jpeg" alt="Nós">
    <img src="foto3.jpeg" alt="Nós">
  </div>

  <a class="botao" href="https://www.youtube.com/watch?v=izGwDsrQ1eQ" target="_blank">
    🎶 Nossa música 🎶
  </a>
 <p style="margin-top:40px; color:white;">
    A musica é brincadeira mas o amor é verdadeiro!
    </p>
    <p style="margin-top:40px; color:white;">
    Eu te amo ❤️
  </p>
</div>

</body>
</html>
