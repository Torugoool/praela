<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra Você ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
}

.container {
  padding: 30px;
  position: relative;
  z-index: 2;
}

h1 {
  color: white;
  font-size: 42px;
}

p {
  font-size: 18px;
  color: #333;
}

.galeria {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.galeria img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.galeria img:hover {
  transform: scale(1.1);
}

.botao {
  display: inline-block;
  margin-top: 30px;
  padding: 15px 25px;
  background-color: #ff4b5c;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
}

/* CORAÇÕES */
.coracao {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: cair linear infinite;
  color: red;
}

@keyframes cair {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<!-- MÚSICA AUTOMÁTICA -->
<audio autoplay loop>
  <source src="https://www.myinstants.com/media/sounds/careless-whisper.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>❤️ Pra Nós Dois ❤️</h1>

  <p>
    Desde o dia que eu te pedi em namoro ao som de Careless Whisper,<br>
    minha vida ficou muito mais bonita com você.<br><br>
    Isso aqui é só um pedacinho do que eu sinto ❤️
  </p>

  <div class="galeria">
    <img src="foto1.jpeg" alt="Nós">
    <img src="foto2.jpeg" alt="Nós">
    <img src="foto3.jpeg" alt="Nós">
  </div>

  <a class="botao" href="https://www.youtube.com/watch?v=izGwDsrQ1eQ" target="_blank">
    🎶 Nossa música 🎶
  </a>

  <p style="margin-top:40px; color:white;">
    A musica é brincadeira mas o amor é verdadeiro!
    </p>
    <p style="margin-top:40px; color:white;">
    Eu te amo ❤️
  </p>
</div>

<script>
// GERAR CORAÇÕES CAINDO
function criarCoracao() {
  const coracao = document.createElement("div");
  coracao.classList.add("coracao");
  coracao.innerHTML = "❤️";

  coracao.style.left = Math.random() * 100 + "vw";
  coracao.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(coracao);

  setTimeout(() => {
    coracao.remove();
  }, 5000);
}

setInterval(criarCoracao, 300);
</script>

</body>
</html>
